name: Doudizhu
options:
  bundleIdPrefix: com.hongzeng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: zh-Hans
  knownRegions:
    - zh-Hans
    - en
    - ja
    - ko
    - fr
    - de
    - es
    - pt-BR

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

# ┌─────────────────────────────────────────────────────────┐
# │ Firebase — 已启用                                       │
# └─────────────────────────────────────────────────────────┘
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  Doudizhu:
    type: application
    platform: iOS
    sources:
      - path: Doudizhu
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Doudizhu/Resources
      - path: Doudizhu/Data/Configs
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PRODUCT_BUNDLE_IDENTIFIER: com.hongzeng.doudizhu
        PRODUCT_NAME: 斗破乾坤
        PRODUCT_MODULE_NAME: Doudizhu
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAnalytics
      - package: firebase-ios-sdk
        product: FirebaseCrashlytics
    postBuildScripts:
      - name: Upload dSYMs to Crashlytics
        script: |
          if [ "${CONFIGURATION}" = "Release" ]; then
            "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          fi
        inputFiles:
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${PRODUCT_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Info.plist
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)
  DoudizhuTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DoudizhuTests
      - path: Doudizhu/Engine/Card.swift
      - path: Doudizhu/Engine/CardPattern.swift
    dependencies: []
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: ""
